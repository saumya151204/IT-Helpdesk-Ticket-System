<h2>Create Ticket</h2>

<form method="POST">
  {% csrf_token %}
  <input type="text" name="title" placeholder="Title"><br>
  <textarea name="description" placeholder="Description"></textarea><br>

  <select name="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select><br>

  <button type="submit">Submit</button>
</form>
